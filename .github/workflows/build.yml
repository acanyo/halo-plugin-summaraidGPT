name: Build Plugin

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          export PATH="$PATH:/usr/local/bin:/root/.local/share/npm/bin"
          rm -rf .gradle build ui/.gradle ui/build packages/.gradle packages/build
          printf 'pluginManagement {
    repositories {
        gradlePluginPortal()
    }
}
rootProject.name = "plugin-summaraidGPT"
// include "ui"
// include "packages"
' > settings.gradle
          printf 'plugins {
    id "java"
    id "io.freefair.lombok" version "8.13"
    id "run.halo.plugin.devtools" version "0.6.2"
}

group "com.handsome.summary"

repositories {
    mavenCentral()
}

dependencies {
    implementation platform("run.halo.tools.platform:plugin:2.23.0")
    compileOnly "run.halo.app:api"
    testImplementation "run.halo.app:api"
    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

test {
    useJUnitPlatform()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}

// tasks commented out to skip ui and packages modules
// tasks.register("processUiResources", Copy) {
//     from project(":ui").layout.buildDirectory.dir("dist")
//     into layout.buildDirectory.dir("resources/main/console")
//     dependsOn project(":ui").tasks.named("assemble")
//     shouldRunAfter tasks.named("processResources")
// }

// tasks.named("processResources") {
//     dependsOn project(":packages").tasks.named("assemble")
// }

// tasks.named("classes") {
//     dependsOn tasks.named("processUiResources")
// }

halo {
    debug = true
    suspend = true
    version = "2.23.1"
}
' > build.gradle
          cat settings.gradle
          cat build.gradle
          ./gradlew classes test --no-build-cache --rerun-tasks

      - name: Find JAR files
        id: find-jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" -type f | head -1)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: halo-plugin-jar
          path: ${{ steps.find-jar.outputs.JAR_FILE }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: halo-plugin-jar

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          files: ${{ env.JAR_FILE }}
          generate_release_notes: true
