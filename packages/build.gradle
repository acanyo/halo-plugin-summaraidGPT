plugins {
    id 'base'
    id "com.github.node-gradle.node" version "7.1.0"
}

group 'com.handsome.summary.packages'

node {
    version = '20.20.1'
    pnpmVersion = '10.22.0'
    download = true
}

tasks.register('pnpmBuild', PnpmTask) {
    group = 'build'
    description = 'Build the packages project using pnpm'
    args = ['build']
    dependsOn tasks.named('pnpmInstall')
    inputs.dir(layout.projectDirectory.dir('src'))
    inputs.files(fileTree(
        dir: layout.projectDirectory,
        includes: ['*.cjs', '*.ts', '*.js', '*.json', '*.yaml']))
    outputs.dir(layout.projectDirectory.dir('dist'))
}

tasks.named('assemble') {
    dependsOn tasks.named('pnpmBuild')
}
