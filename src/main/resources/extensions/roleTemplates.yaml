apiVersion: v1alpha1
kind: "Role"
metadata:
  name: role-template-manage-summaraidGPT
  labels:
    halo.run/role-template: "true"
    halo.run/hidden: "true"
    rbac.authorization.halo.run/aggregate-to-anonymous: "true"
rules:
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["updateContent","dialogConfig","summaryConfig"]
    verbs: ["update", "create", "get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["articleReadings","articleReadingInteractions"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragSearch","ragAsk","ragAskStream","ragAgentChat"]
    verbs: ["create"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragConversations"]
    verbs: ["get"]
---
apiVersion: v1alpha1
kind: "Role"
metadata:
  name: role-template-view-summaraidGPT-rag
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "智阅AI助手"
    rbac.authorization.halo.run/display-name: "查看智阅 AI 助手"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:summaraidGPT:rag:view","plugin:summaraidGPT:ai-call-logs:view","plugin:summaraidGPT:pets:view","plugin:summaraidGPT:article-reading:view"]
rules:
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragKnowledgeBases","ragDocuments"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragStats","ragImportablePosts","ragImportableDocsmeDocuments","ragIndexTasks","ragIndexTasks/subscribe"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragConversations"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["aiCallLogs"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["articleReadings"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["petCompanions"]
    verbs: ["get", "list"]
---
apiVersion: v1alpha1
kind: "Role"
metadata:
  name: role-template-manage-summaraidGPT-rag
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/dependencies: |
      ["role-template-view-summaraidGPT-rag"]
    rbac.authorization.halo.run/module: "智阅AI助手"
    rbac.authorization.halo.run/display-name: "管理智阅 AI 助手"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:summaraidGPT:rag:manage","plugin:summaraidGPT:ai-call-logs:manage","plugin:summaraidGPT:pets:manage","plugin:summaraidGPT:article-reading:manage"]
rules:
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragKnowledgeBases","ragDocuments","ragDocuments/status"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragStats","ragImportablePosts","ragImportableDocsmeDocuments","ragIndexTasks","ragIndexTasks/subscribe"]
    verbs: ["get", "list"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragImportPosts","ragImportDocsmeDocuments","ragRebuild","ragRebuildNow","ragSearch","ragAsk","ragAskStream","ragAgentChat","ragDocumentsBatchDelete"]
    verbs: ["create"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["ragConversations"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["aiCallLogs"]
    verbs: ["delete"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["articleReadings"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["api.summary.summaraidgpt.lik.cc"]
    resources: ["petCompanions","petCompanions/active","petCompanions/status"]
    verbs: ["get", "list", "create", "update", "delete"]
  - nonResourceURLs: ["/apis/api.summary.summaraidgpt.lik.cc/v1alpha1/petCompanions/import"]
    verbs: ["create"]
